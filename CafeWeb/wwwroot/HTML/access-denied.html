<!-- На эту страницу будет перекидывать при отказе в доступе-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="../IMG/logo-cafe.png" type="image/png">
    <title>403 Forbidden</title>
    <link href="../CSS/access-denied.css" rel="stylesheet" />
</head>
<body>
    <noscript>
        <!-- Отображается только если у пользователя выключен js в браузере -->
        <div style="background-color: #f44336; color: white; padding: 20px; text-align: center;">
            Для полноценной работы сайта включите JavaScript в настройках вашего браузера.
        </div>
    </noscript>
    <div class="container">
        <img id="logo" src="../IMG/logo-cafe.png" />
        <div class="container-row">
            <h1>4</h1>

            <video muted autoplay loop>
                <source src="../VIDEO/toxis.mp4" type="video/mp4" />

            </video>

            <h1>3</h1>
        </div>

        <div class="under">

            <button class="btn">На главную</button>

        </div>
    </div>
    <script src="../JS/goToPage.js"></script>
    <script>
        async function getUserData() {
            try {
                const response = await fetch('/me');
                if (!response.ok) {
                    throw new Error(`HTTP error status: ${response.status}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                return null; 
            }
        }

        async function initializePage() {
            try {
                const user = await getUserData();
                let url;

                if (user && user.role === 'admin') {
                    url = '/admin/index';
                }
                else {
                    url = '/cafe/index'
                }

                // Назначаем обработчик
                const button = document.querySelector('.btn');
                if (button) {
                    button.onclick = function () {
                        goToPage(url);
                    };
                } 
            } catch (error) {
                console.error('Ошибка инициализации:', error);
            }
        }

        initializePage();
    </script>

</body>
</html>
